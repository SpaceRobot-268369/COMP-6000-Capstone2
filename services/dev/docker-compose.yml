services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./postgresql/data:/var/lib/postgresql/data
      - ./db_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PORT: ${BACKEND_PORT}
      # AI server runs locally (not in Docker) to access macOS GPU (MPS)
      AI_SERVER_URL: http://host.docker.internal:8000
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT}
    ports:
      - "${FRONTEND_PORT}:5173"
    depends_on:
      - backend
    volumes:
      - ../../frontend:/app
      - frontend_node_modules:/app/node_modules

  # acoustic_ai and acoustic_ai_server are intentionally removed.
  # The AI server must run natively on macOS to access the Apple GPU (MPS).
  # Start it with:
  #   cd acoustic_ai && uvicorn server:app --reload --port 8000

volumes:
  backend_node_modules:
  frontend_node_modules:
